<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript Homework04</title>
    <link rel="stylesheet" href="./output.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>

  <body class="bg-blue-300 h-screen">
    <div class="w-full">
      <div class="w-[860px] mx-auto my-10 p-4 rounded-2xl shadow-lg">
        <div class="flex justify-between items-center mb-10">
          <div class="text-4xl font-bold">Task List</div>
          <button
            class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded-lg"
            id="btnOpenAdd"
            type="button"
          >
            Add Task
          </button>
        </div>

        <table class="w-full">
          <thead>
            <tr class="h-16 bg-white rounded-3xl shadow-lg mb-3 flex items-center">
              <th class="px-6 w-70 text-cyan-400 text-left">Task</th>
              <th class="px-3 w-1/4 text-cyan-400 text-center">Priority</th>
              <th class="px-3 w-1/4 text-cyan-400 text-center">Status</th>
              <th class="px-3 w-1/4 text-yellow-500 text-center">Actions</th>
            </tr>
          </thead>

          <tbody id="taskBody"></tbody>
        </table>
      </div>
      <div id="taskModal" class="fixed inset-0 hidden items-center justify-center bg-black/40">
        <div class="bg-white w-135 rounded-2xl shadow-xl p-6 relative">
          <button id="btnCloseModal" class="absolute right-4 top-4 text-2xl" aria-label="Close">
            <i class="fa-solid fa-xmark"></i>
          </button>
          <h2 id="modalTitle" class="text-3xl font-bold mb-6">Add Task</h2>
          <div class="space-y-4">
            <div>
              <label class="block font-semibold mb-2">Task</label>
              <input
                id="inputTask"
                class="w-full border-2 border-cyan-300 rounded-xl px-4 py-2 outline-none focus:border-cyan-500"
                placeholder="Web Homework"
                type="text"
              />
            </div>
            <div>
              <label class="block font-semibold mb-2">Priority</label>
              <div class="flex gap-3">
                <button id="btnHigh" type="button" class="border-2 border-red-500 text-red-500 px-6 py-2 rounded-full">
                  High
                </button>
                <button id="btnMedium" type="button" class="border-2 border-yellow-500 text-yellow-500 px-6 py-2 rounded-full">
                  Medium
                </button>
                <button id="btnLow" type="button" class="border-2 border-green-500 text-green-500 px-6 py-2 rounded-full">
                  Low
                </button>
              </div>
            </div>
            <div>
              <label class="block font-semibold mb-2">Status</label>
              <div class="flex gap-3">
                <button id="btnTodo" type="button" class="border-2 border-cyan-300 text-cyan-400 px-6 py-2 rounded-full">
                  To Do
                </button>
                <button id="btnProgress" type="button" class="border-2 border-cyan-300 text-cyan-400 px-6 py-2 rounded-full">
                  Progress
                </button>
                <button id="btnDone" type="button" class="border-2 border-cyan-300 text-cyan-400 px-6 py-2 rounded-full">
                  Done
                </button>
              </div>
            </div>
            <div class="flex justify-end pt-2">
              <button id="btnSaveTask" type="button" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-10 rounded-full">
                Save
              </button>
            </div>
          </div>
        </div>
      </div>

      <div id="confirmModal" class="fixed inset-0 hidden items-center justify-center bg-black/40">
        <div class="bg-white w-160 rounded-2xl shadow-xl p-8 text-center">
          <h3 class="text-3xl font-bold text-red-600 mb-4">Are you sure?</h3>
          <div class="text-6xl text-red-600 mb-6">
            <i class="fa-solid fa-triangle-exclamation"></i>
          </div>

          <div class="flex justify-center gap-6">
            <button id="btnConfirmYes" type="button" class="bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-10 rounded-xl">
              Yes
            </button>
            <button id="btnConfirmNo" type="button" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-10 rounded-xl">
              No
            </button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
